server:
    compression:
        enabled: true
    port: 9191

api.base-path: /invoice-quickbooks-service/v1

spring:
    application:
        name: Invoice-Quickbooks-Service
        tokenName: auth-token
        tokenValue: bad823a746854251ab076e1d2460647deeb8c79dd14849dabb7f43a4bfac60c1
    main.banner-mode: off
    jackson:
        serialization:
            write-dates-as-timestamps: false
        default-property-inclusion: non_null
    security:
        cors:
            allow-credentials: true
            allowed-origins: https://icligo.com, https://www.icligo.com, https://login.icligo.com, https://dev.icligo.com:3300, https://staging.icligo.com
            allowed-methods: '*'
            allowed-headers: '*'
        oauth2:
            client:
                provider:
                    uaa:
                        issuer-uri: https://login.icligo.com
                        authorization-uri: https://login.icligo.com/oauth2/authorize
                        token-uri: https://login.icligo.com/oauth2/token
                        user-info-uri: https://login.icligo.com/oauth2/userinfo
                        user-name-attribute: sub
                        jwk-set-uri: https://login.icligo.com/.well-known/jwks.json
                registration:
                    uaa:
                        client-id: 5aa1c1ed-82fa-4e59-9122-557d89f942bf
                        client-secret: WUanoZDgUMn3qhv6KXySSM3CqfNmm__qlNUMbww3RM0
            resourceserver:
                jwt:
                    issuer-uri: https://login.icligo.com
                    jwk-set-uri: https://login.icligo.com/.well-known/jwks.json
    data:
        mongodb:
            uri: mongodb://root:rootpassword@localhost:27017/quickbooks?authSource=admin&waitQueueMultiple=1000
            auto-index-creation: true

