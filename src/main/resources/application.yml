mailjet:
    send-enabled: true
    public-key: ${MAILJET_PUBLIC_KEY:}
    private-key: ${MAILJET_PRIVATE_KEY:}
    from-email: no-reply@icligo.com
    from-name: Invoice QuickBooks Service
    admin-email: diogomendes@icligo.com

# ─── Temporal ────────────────────────────────────────────────────────────────
temporal:
    connection:
        target: 127.0.0.1:7233   # override with TEMPORAL_TARGET env var in production
    namespace: default
    worker:
        task-queue: quickbooks-task-queue

logging.level.org.springframework:
    web: DEBUG
    ws:
        client:
            MessageTracing:
                sent: TRACE
                received: TRACE
        server:
            MessageTracing:
                sent: TRACE
                received: TRACE
