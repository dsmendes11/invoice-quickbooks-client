server:
    compression:
        enabled: true
    port: 9191

api.base-path: /invoice-quickbooks-service/v1

# ─── Shared config only ───────────────────────────────────────────────────────
# Everything environment-specific (QuickBooks base-url/OAuth URLs, MongoDB URI, Temporal
# target, logging verbosity) lives in application-dev.yml / application-prod.yml — one of
# those two profiles must always be active (spring.profiles.active=dev|prod), this file alone
# is not a complete config. Every credential below is env-var-only, with no default, so a real
# secret is never checked into source control.
spring:
    application:
        name: Invoice-Quickbooks-Service
        tokenName: auth-token
        tokenValue: ${SPRING_APPLICATION_TOKENVALUE}
    main.banner-mode: off
    jackson:
        serialization:
            write-dates-as-timestamps: false
        default-property-inclusion: non_null
    security:
        cors:
            allow-credentials: true
            allowed-origins: https://icligo.com, https://www.icligo.com, https://login.icligo.com, https://dev.icligo.com:3300, https://staging.icligo.com
            allowed-methods: '*'
            allowed-headers: '*'
        oauth2:
            client:
                provider:
                    uaa:
                        issuer-uri: https://login.icligo.com
                        authorization-uri: https://login.icligo.com/oauth2/authorize
                        token-uri: https://login.icligo.com/oauth2/token
                        user-info-uri: https://login.icligo.com/oauth2/userinfo
                        user-name-attribute: sub
                        jwk-set-uri: https://login.icligo.com/.well-known/jwks.json
                registration:
                    uaa:
                        client-id: ${UAA_CLIENT_ID}
                        client-secret: ${UAA_CLIENT_SECRET}
            resourceserver:
                jwt:
                    issuer-uri: https://login.icligo.com
                    jwk-set-uri: https://login.icligo.com/.well-known/jwks.json
    data:
        mongodb:
            auto-index-creation: true

quickbooks:
    api:
        realm-id: ${QUICKBOOKS_API_REALM_ID}
        client-id: ${QUICKBOOKS_API_CLIENT_ID}
        client-secret: ${QUICKBOOKS_API_CLIENT_SECRET}
        access-token: ${QUICKBOOKS_API_ACCESS_TOKEN}
        refresh-token: ${QUICKBOOKS_API_REFRESH_TOKEN}
    deposit:
        # Deposit account for SalesReceipt/RefundReceipt (QuickBooks' DepositToAccountRef).
        # Validated to exist in QuickBooks on every SalesReceipt/RefundReceipt creation — the
        # request fails if this Account doesn't exist in the company. Not applicable to Invoice
        # itself (QuickBooks has no deposit-account field on Invoice; it only posts to Accounts
        # Receivable) — see payment-account-name below for the Payment recorded against it.
        sales-refund-account-name: "1030 - Stripe/Paypal"
        # Deposit account for the Payment recorded against a non-"Reserva" Invoice (see
        # docs/OPERATIONS.md §8) — deliberately separate from sales-refund-account-name above,
        # since invoice payments settle into a different real-world account. Same validation.
        payment-account-name: "1010 - BPI"
    # ─── Production connection: READ-ONLY source for the sandbox-copy feature ────
    # No defaults on purpose — must be provided via environment variables so a
    # production credential is never checked into source control. Note that in the "prod"
    # profile, quickbooks.api.* (above) and quickbooks.prod.* (below) point at the SAME real
    # company by design (see application-prod.yml) — SandboxCopyService.assertSafeToCopy()
    # will therefore correctly refuse to run there; the sandbox-copy feature is dev-profile-only.
    prod:
        base-url: https://quickbooks.api.intuit.com
        realm-id: ${QUICKBOOKS_PROD_REALM_ID:}
        client-id: ${QUICKBOOKS_PROD_CLIENT_ID:}
        client-secret: ${QUICKBOOKS_PROD_CLIENT_SECRET:}
        access-token: ${QUICKBOOKS_PROD_ACCESS_TOKEN:}
        refresh-token: ${QUICKBOOKS_PROD_REFRESH_TOKEN:}

# ─── Mailjet (admin alerts) ──────────────────────────────────────────────────
mailjet:
    send-enabled: true
    public-key: ${MAILJET_PUBLIC_KEY:}
    private-key: ${MAILJET_PRIVATE_KEY:}
    from-email: no-reply@icligo.com
    from-name: Invoice QuickBooks Service
    admin-email: diogomendes@icligo.com

# ─── Temporal ────────────────────────────────────────────────────────────────
temporal:
    namespace: default
    worker:
        task-queue: quickbooks-task-queue
