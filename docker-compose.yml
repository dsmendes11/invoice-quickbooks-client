services:
  invoice-quickbooks-client:
    build: .
    container_name: invoice-quickbooks-client
    ports:
      - "9191:9191"
    environment:
      # Overrides application.yml via Spring Boot's env-var relaxed binding — no yml edits needed.
      SPRING_DATA_MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/quickbooks?authSource=admin
      TEMPORAL_CONNECTION_TARGET: temporal:7233
      QUICKBOOKS_API_BASE_URL: ${QUICKBOOKS_API_BASE_URL:-https://sandbox-quickbooks.api.intuit.com}
      QUICKBOOKS_API_REALM_ID: ${QUICKBOOKS_API_REALM_ID:-}
      QUICKBOOKS_API_CLIENT_ID: ${QUICKBOOKS_API_CLIENT_ID:-}
      QUICKBOOKS_API_CLIENT_SECRET: ${QUICKBOOKS_API_CLIENT_SECRET:-}
      QUICKBOOKS_API_ACCESS_TOKEN: ${QUICKBOOKS_API_ACCESS_TOKEN:-}
      QUICKBOOKS_API_REFRESH_TOKEN: ${QUICKBOOKS_API_REFRESH_TOKEN:-}
      QUICKBOOKS_OAUTH_REDIRECT_URI: ${QUICKBOOKS_OAUTH_REDIRECT_URI:-https://invoices.icligo.com/quickbooks/callback}
      QUICKBOOKS_OAUTH_CONNECT_URI: ${QUICKBOOKS_OAUTH_CONNECT_URI:-https://invoices.icligo.com/quickbooks/connect}
      SPRING_APPLICATION_TOKENVALUE: ${AUTH_TOKEN:-}
      MAILJET_PUBLIC_KEY: ${MAILJET_PUBLIC_KEY:-}
      MAILJET_PRIVATE_KEY: ${MAILJET_PRIVATE_KEY:-}
    depends_on:
      - mongodb
      - temporal
    networks:
      - invoice-quickbooks-network
    restart: on-failure:5
    # No healthcheck against /quickbooks/launch here on purpose — it forces a real QuickBooks
    # token refresh on every call (see docs/OPERATIONS.md §4), which a tight Docker healthcheck
    # loop would hammer. This only checks that the HTTP port is up.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9191"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:6.0
    container_name: invoice-quickbooks-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - invoice-quickbooks-network
    restart: unless-stopped

  cassandra:
    image: cassandra:4.1
    container_name: invoice-quickbooks-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - invoice-quickbooks-network
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.23.0
    container_name: invoice-quickbooks-temporal
    depends_on:
      - cassandra
    environment:
      CASSANDRA_SEEDS: cassandra
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-cass.yaml
    ports:
      - "7233:7233"
    networks:
      - invoice-quickbooks-network
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: invoice-quickbooks-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8081:8080"
    networks:
      - invoice-quickbooks-network
    restart: unless-stopped

networks:
  invoice-quickbooks-network:
    driver: bridge

volumes:
  mongodb_data:
  cassandra_data:
